apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: euclid-catalog-mcp
  labels:
    app: euclid-catalog-mcp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    cert-manager.io/cluster-issuer: "self-signed-ca-issuer"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - euclid-catalog.example.com
    secretName: euclid-catalog-tls
  rules:
  - host: euclid-catalog.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: euclid-catalog-mcp
            port:
              number: 8000
