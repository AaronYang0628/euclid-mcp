apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-inspector
  labels:
    app: mcp-inspector
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-inspector
  template:
    metadata:
      labels:
        app: mcp-inspector
        version: v1
    spec:
      containers:
        - name: mcp-inspector
          image: ghcr.io/modelcontextprotocol/inspector:latest
          imagePullPolicy: Always
          ports:
            - name: web
              containerPort: 6274
              protocol: TCP
            - name: mcp
              containerPort: 6277
              protocol: TCP
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: MCP_AUTO_OPEN_ENABLED
              value: "false"
            - name: ALLOWED_ORIGINS
              value: "https://inspector.mcp.ay.dev:32443,https://inspector.mcp.ay.dev,http://10.15.49.92:32225,http://10.15.49.92:32220"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 6274
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 6274
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
